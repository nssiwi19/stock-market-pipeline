services:
  - type: worker
    name: stock-qa-bot
    env: docker
    dockerfilePath: ./Dockerfile
    region: singapore
    # Dùng plan free hoặc starter tuỳ account của bạn
    plan: free
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONPATH
        value: "/app"
      # Các biến bảo mật (sync: false nghĩa là bạn sẽ nhập giá trị trực tiếp trên Web Dashboard của Render)
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GEMINI_API_KEY
        sync: false
