name: Daily Stock Market Pipeline

on:
  schedule:
    # 08:30 UTC = 15:30 (3:30 PM) Vietnam Time (Ngay sau khi thị trường đóng cửa)
    - cron: '30 8 * * 1-5' 
  workflow_dispatch: # Cho phép bấm Run thủ công

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bs4 beautifulsoup4 lxml

      - name: Run ETL Pipeline
        env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }} # Thiếu dòng này là bot câm
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}     # Thiếu dòng này là bot điếc
        run: |
          python run_pipeline.py
